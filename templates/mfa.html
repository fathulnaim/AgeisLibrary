<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
	<title>AgeisLibrary</title>
</head>
<body style="background: #f4f7f6; padding-top: 70px;">
<!--Navigation bar-->
<nav class="navbar navbar-dark bg-dark px-4 shadow-sm fixed-top">
    <span class="navbar-brand fw-bold">AgeisLibrary</span>
    <div>
        <a href="/dashboard" class="btn btn-outline-info btn-sm me-2">Back To Dashboard</a>
    </div>
</nav>

<div class="d-flex align-items-center justify-content-center" style="height: calc(100vh - 70px);">
    <div class="card p-5 shadow-lg text-center" style="width: 450px; border-radius: 20px; background: white;">
        <div class="mb-4">
            <span style="font-size: 50px;">🔐</span>
            <h3>OTP Verification</h3>
            <p class="text-muted">
				<!--Where is the otp send-->
                Code sent to: <br>
                <strong class="text-primary">{{ email_hint }}</strong>
            </p>
        </div>

        <div class="mb-3">
            <div class="badge bg-light text-dark border p-2" style="font-size: 0.9rem;">
                Code expires in:
                <span id="timer" class="fw-bold text-danger">60</span>s
            </div>
        </div>
		<!--Message-->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-warning py-2 small">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/mfa" method="POST">
            <div class="mb-4">
                <input type="text" name="code"
                       class="form-control form-control-lg text-center"
                       placeholder="000000" maxlength="6" required autofocus
                       style="letter-spacing: 8px; font-size: 1.5rem; font-weight: bold;">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">
                Verify Identity
            </button>
        </form>

        <div class="mt-4">
            <p class="small text-muted">
                Didn't get the code? <br>
                <a href="/send_mfa" class="text-decoration-none">Resend Manual</a>
            </p>
        </div>
    </div>
</div>
<!--Javascript here-->
<script>
    let timeLeft = 60;
    const timerElement = document.getElementById('timer');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            window.location.href = "/send_mfa";
        }

        if (timeLeft <= 10) {
            timerElement.classList.add('text-danger');
        }
    }, 1000);
</script>

</body>
</html>
