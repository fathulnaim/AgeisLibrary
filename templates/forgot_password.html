<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
	<title>AgeisLibrary</title>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background: #f8f9fa;">

<div class="card p-5 shadow-lg" style="width: 450px; border-radius: 20px;">
    <div class="text-center mb-4">
        <span style="font-size: 50px;">🔍</span>
        <h3 class="mt-2">Recover Password</h3>
        <p class="text-muted">Enter your registered email to receive a secure reset code.</p>
    </div>

    <!--Message-->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2 small text-center">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

	<!--User enter email addr-->
    <form action="/forgot_password" method="POST">
        <div class="mb-4">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="name@example.com" required maxlength="50">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Code</button>
    </form>

    <div class="mt-4 text-center">
        <a href="/login_page" class="text-decoration-none small">Back to Login</a>
    </div>
</div>

</body>
</html>
