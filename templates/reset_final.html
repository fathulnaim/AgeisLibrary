<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<title>AgeisLibrary</title>
</head>

<body class="d-flex align-items-center justify-content-center"
      style="height: 100vh; background: #f8f9fa;">

<div class="card p-5 shadow-lg" style="width: 450px; border-radius: 20px;">

    <div class="text-center mb-4">
        <span style="font-size: 50px;">🔑</span>
        <h3>New Password</h3>
        <p class="text-muted">Please choose a strong password for your account.</p>
    </div>

    <!--Message-->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger py-2 small">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/reset_password_final" method="POST">

        <!--Enter new password here-->
        <div class="mb-3">
            <label class="form-label small fw-bold">New Password</label>

            <div class="position-relative">
                <input type="password" id="passwordInput" name="password"
                       class="form-control"
                       placeholder="Min 8 characters"
                       required maxlength="32"
                       onkeyup="checkStrength()">

                <span onclick="togglePassword('passwordInput', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <small id="strengthText" class="small"></small>
        </div>

        <!--Password check-->
        <div class="mb-4">
            <label class="form-label small fw-bold">Confirm New Password</label>

            <div class="position-relative">
                <input type="password" id="confirmPasswordInput" name="confirm"
                       class="form-control"
                       placeholder="Repeat password"
                       required maxlength="32"
                       onkeyup="checkMatch()">

                <span onclick="togglePassword('confirmPasswordInput', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <small id="matchText" class="small"></small>
        </div>
		
		<!--Submit-->
        <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">
            Update Password
        </button>

    </form>
</div>

<!--Javascrpt-->
<script>
function togglePassword(inputId, iconWrapper) {
    const input = document.getElementById(inputId);
    const icon = iconWrapper.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

function checkStrength() {
    const password = document.getElementById("passwordInput").value;
    const text = document.getElementById("strengthText");

    if (password.length === 0) {
        text.innerText = "";
    } else if (password.length < 8) {
        text.innerText = "Weak (too short)";
        text.className = "text-danger small";
    } else if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) {
        text.innerText = "Strong password";
        text.className = "text-success small";
    } else {
        text.innerText = "Medium (add numbers, symbols & capital letters)";
        text.className = "text-warning small";
    }
}

function checkMatch() {
    const pass = document.getElementById("passwordInput").value;
    const confirm = document.getElementById("confirmPasswordInput").value;
    const text = document.getElementById("matchText");

    if (confirm.length === 0) {
        text.innerText = "";
    } else if (pass === confirm) {
        text.innerText = "Passwords match";
        text.className = "text-success small";
    } else {
        text.innerText = "Passwords do not match";
        text.className = "text-danger small";
    }
}
</script>

</body>
</html>
