<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>AgeisLibrary</title>
</head>

<body class="d-flex align-items-center justify-content-center"
      style="height: 100vh; background: #f8f9fa;">

<div class="card p-5 shadow-lg" style="width: 450px; border-radius: 20px;">

    <div class="text-center mb-4">
        <span style="font-size: 50px;">🔑</span>
        <h3>New Password</h3>
        <p class="text-muted">Please choose a strong password for your account.</p>
    </div>

    <!-- Flash message -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-danger py-2 small">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/reset_password_final" method="POST">

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label small fw-bold">New Password</label>

            <div class="position-relative">
                <input type="password" id="passwordInput" name="password"
                       class="form-control"
                       placeholder="Min 8 characters"
                       required maxlength="32"
                       onkeyup="validateForm()">

                <span onclick="togglePassword('passwordInput', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <small id="strengthText" class="small"></small>
        </div>

        <!-- Confirm -->
        <div class="mb-4">
            <label class="form-label small fw-bold">Confirm New Password</label>

            <div class="position-relative">
                <input type="password" id="confirmPasswordInput" name="confirm"
                       class="form-control"
                       placeholder="Repeat password"
                       required maxlength="32"
                       onkeyup="validateForm()">

                <span onclick="togglePassword('confirmPasswordInput', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">
                    <i class="fa-solid fa-eye"></i>
                </span>
            </div>

            <small id="matchText" class="small"></small>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn"
                class="btn btn-success w-100 py-2 shadow-sm"
                disabled>
            Update Password
        </button>

    </form>
</div>

<script>
function togglePassword(inputId, iconWrapper) {
    const input = document.getElementById(inputId);
    const icon = iconWrapper.querySelector("i");

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

function validateForm() {
    const password = document.getElementById("passwordInput").value;
    const confirm = document.getElementById("confirmPasswordInput").value;

    const strengthText = document.getElementById("strengthText");
    const matchText = document.getElementById("matchText");
    const submitBtn = document.getElementById("submitBtn");

    const hasUpper = /[A-Z]/.test(password);
    const hasNumber = /[0-9]/.test(password);
    const hasSymbol = /[!@#$%^&*]/.test(password);

    let strong = false;
    let match = false;

    // 🔐 Strength check
    if (password.length === 0) {
        strengthText.innerText = "";
    }
    else if (password.length < 8) {
        strengthText.innerText = "Weak password (too short)";
        strengthText.className = "text-danger small";
    }
    else if (hasUpper && hasNumber && hasSymbol) {
        strengthText.innerText = "Strong password";
        strengthText.className = "text-success small";
        strong = true;
    }
    else {
        strengthText.innerText = "Medium (add caps, numbers & symbols)";
        strengthText.className = "text-warning small";
    }

    // 🔁 Match check
    if (confirm.length === 0) {
        matchText.innerText = "";
    }
    else if (password === confirm) {
        matchText.innerText = "Passwords match";
        matchText.className = "text-success small";
        match = true;
    }
    else {
        matchText.innerText = "Passwords do not match";
        matchText.className = "text-danger small";
    }

    // 🚫 FINAL RULE: only allow strong + match
    submitBtn.disabled = !(strong && match);
}
</script>

</body>
</html>
