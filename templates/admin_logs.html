<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
	<title>AgeisLibrary</title>
</head>
<body style="background-color: #f8f9fa;">

<nav class="navbar navbar-dark bg-dark px-4 shadow-sm">
    <span class="navbar-brand fw-bold">🛡️ Security Audit Logs</span>
    <div>
        <a href="/admin" class="btn btn-outline-info btn-sm">Back to Admin Panel</a>
    </div>
</nav>

<div class="container-fluid mt-4 px-5">
    <div class="card border-0 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">System Activity Audit Trail</h4>
            <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">🖨️ Export PDF</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle small">
                <thead class="table-dark">
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Activity</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td class="text-muted"><code>{{ log.timestamp }}</code></td>
                        <td>
                            <span class="badge bg-secondary">{{ log.username }}</span>
                        </td>
                        <td class="fw-bold">{{ log.activity }}</td>
                        <td class="text-muted italic">{{ log.details }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
