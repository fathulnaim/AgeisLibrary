<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
	<title>AgeisLibrary</title>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background: #f8f9fa;">

<div class="card p-5 shadow-lg text-center" style="width: 450px; border-radius: 20px;">
	<!--Popup-->
    <div class="mb-4">
        <span style="font-size: 50px;">📧</span>
        <h3>Verify Reset Code</h3>
        <p class="text-muted">A reset code has been sent to your email.</p>
    </div>
	
	<!--Timer-->
    <div class="mb-3">
        <div class="badge bg-light text-dark border p-2">
            Code expires in: <span id="timer" class="fw-bold text-danger">60</span>s
        </div>
    </div>
	
	<!--Message-->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-warning py-2 small">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}
	
	<!---Enter number OTP-->
    <form action="/verify_reset_otp" method="POST">
        <div class="mb-4">
            <input type="text" name="code" class="form-control form-control-lg text-center"
                   placeholder="000000" maxlength="6" required autofocus
                   style="letter-spacing: 8px; font-weight: bold; font-size: 1.5rem;">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Verify Code</button>
    </form>
	
	<!--Resend code if needed-->
    <div class="mt-4">
        <a href="/forgot_password" class="small text-decoration-none">Resend Code</a>
    </div>
</div>

<!--Javascript here-->
<script>
    let timeLeft = 60;
    const timerElement = document.getElementById('timer');
    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            window.location.href = "/forgot_password";
        }
    }, 1000);
</script>

</body>
</html>
